apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    alpha.image.policy.openshift.io/resolve-names: "*"
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"finlex-lukija:staging","namespace":"ohtuprojekti-staging"},"fieldPath":"spec.template.spec.containers[?(@.name==\"finlex-lukija\")].image","pause":"false"}]
  name: finlex-lukija-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finlex-lukija
  template:
    metadata:
      labels:
        app: finlex-lukija
    spec:
      initContainers:
        - name: wait-for-typesense
          image: busybox:1.35
          command:
            [
              "sh",
              "-c",
              'until nc -z finlex-typesense-svc 8000; do echo "Waiting for typesense..."; sleep 2; done; echo "Typesense is ready"',
            ]
      containers:
        - name: finlex-lukija
          image: finlex-lukija:staging
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PG_URI
              valueFrom:
                configMapKeyRef:
                  name: finlex-lukija-config
                  key: PG_URI
            - name: NODE_ENV
              value: "production"
            - name: TYPESENSE_HOST
              value: "finlex-typesense-svc"
            - name: TYPESENSE_PORT
              value: "8000"
            - name: TYPESENSE_API_KEY
              valueFrom:
                configMapKeyRef:
                  name: finlex-lukija-config
                  key: TYPESENSE_API_KEY
            - name: ADMIN_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: finlex-lukija-config
                  key: ADMIN_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: finlex-lukija-config
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /api/ping
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/check-db-status
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /api/ping
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            limits:
              memory: "3800Mi"
              cpu: "1000m"
            requests:
              memory: "1000Mi"
              cpu: "500m"
